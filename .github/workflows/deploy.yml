name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Sesuaikan ke 'master' jika repositori Anda menggunakan master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file from Secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" >> .env

      - name: Build Web
        run: |
          # Mendapatkan nama repositori secara otomatis untuk base-href
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          flutter build web --release --base-href "/$REPO_NAME/"
          # Buat file .nojekyll agar GitHub Pages tidak memfilter file dotfiles (seperti .env)
          touch build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
